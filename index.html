<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F8F6FF">
<title>FunBite — Bite-Sized Internet Fun</title>
<meta name="description" content="FunBite — tiny interactive games and toys you can finish before your coffee gets cold.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍪</text></svg>">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #F8F6FF;
    --ink: #201A2B;
    --ink-soft: rgba(32,26,43,.62);
    --card-bg: #FFFFFF;

    --pink: #FF3E6C;
    --pink-soft: #FFE3EB;
    --purple: #6C3EF4;
    --purple-soft: #ECE6FF;
    --mint: #17C3A2;
    --mint-soft: #DFF7F1;
    --yellow: #FFC93C;
    --yellow-soft: #FFF3D1;

    --radius: 24px;
    --shadow: 0 14px 30px -14px rgba(32,26,43,.22);
  }

  *{ box-sizing: border-box; }
  html{ -webkit-text-size-adjust: 100%; }
  body{
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Manrope', system-ui, sans-serif;
    line-height: 1.5;
    overflow-x: hidden;
  }
  h1, h2, h3, .logo-text{
    font-family: 'Baloo 2', ui-rounded, sans-serif;
    margin: 0;
  }
  a{ color: inherit; }
  img, svg{ display: block; }

  /* ---------- top bar ---------- */
  .topbar{
    position: sticky;
    top: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    background: rgba(248,246,255,.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(32,26,43,.07);
  }
  .logo{
    position: relative;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--yellow), var(--pink));
    flex-shrink: 0;
  }
  .logo::after{
    content: '';
    position: absolute;
    top: -6px;
    right: -3px;
    width: 15px;
    height: 15px;
    border-radius: 50%;
    background: var(--bg);
  }
  .logo-text{
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -.01em;
  }
  .logo-text span{ color: var(--pink); }

  /* ---------- hero ---------- */
  .hero{
    position: relative;
    max-width: 640px;
    margin: 0 auto;
    padding: 56px 24px 36px;
    text-align: center;
    overflow: hidden;
  }
  .blob{
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: .45;
    z-index: 0;
  }
  .blob-1{ width: 180px; height: 180px; background: var(--pink); top: -40px; left: -50px; }
  .blob-2{ width: 160px; height: 160px; background: var(--purple); top: 10px; right: -60px; }
  .blob-3{ width: 140px; height: 140px; background: var(--mint); bottom: -60px; left: 40%; }

  .eyebrow{
    position: relative;
    display: inline-block;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--purple);
    margin-bottom: 14px;
  }
  .hero h1{
    position: relative;
    font-size: clamp(30px, 7vw, 44px);
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -.01em;
  }
  .hero p{
    position: relative;
    max-width: 460px;
    margin: 16px auto 0;
    color: var(--ink-soft);
    font-size: 16px;
  }

  /* ---------- games grid ---------- */
  .section-label{
    max-width: 1040px;
    margin: 0 auto;
    padding: 0 24px;
    font-size: 13px;
    font-weight: 800;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  .grid{
    max-width: 1040px;
    margin: 14px auto 0;
    padding: 0 24px 60px;
    display: grid;
    gap: 18px;
    grid-template-columns: 1fr;
  }
  @media (min-width: 640px){
    .grid{ grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); }
  }

  .card{
    --accent: var(--pink);
    --accent-soft: var(--pink-soft);
    position: relative;
    display: block;
    text-decoration: none;
    background: var(--card-bg);
    border-radius: var(--radius);
    border: 2px solid transparent;
    box-shadow: var(--shadow);
    padding: 26px 22px 22px;
    cursor: pointer;
    opacity: 0;
    transform: translateY(14px);
    animation: fadeUp .5s ease forwards;
    animation-delay: calc(var(--i, 0) * 90ms);
  }
  @keyframes fadeUp{ to{ opacity: 1; transform: translateY(0); } }

  .card:focus-visible{
    outline: 3px solid var(--purple);
    outline-offset: 3px;
  }
  .card.soon{
    border: 2px dashed rgba(32,26,43,.25);
    box-shadow: none;
    background: rgba(255,255,255,.55);
  }

  /* the "bite" taken out of the corner */
  .bite{
    position: absolute;
    top: -12px;
    right: 22px;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--bg);
    transition: transform .35s ease;
    pointer-events: none;
  }
  .card.biting .bite{ transform: scale(1.3) translateY(6px); }

  .crumb{
    position: absolute;
    top: 4px;
    right: 14px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    pointer-events: none;
  }
  .crumb:nth-child(2){ right: 30px; width: 4px; height: 4px; }
  .crumb:nth-child(3){ right: 6px; width: 5px; height: 5px; }
  .card.biting .crumb{ animation: crumbFall .6s ease forwards; }
  .card.biting .crumb:nth-child(2){ animation-delay: .05s; }
  .card.biting .crumb:nth-child(3){ animation-delay: .1s; }
  @keyframes crumbFall{
    0%{ opacity: 1; transform: translate(0,0); }
    100%{ opacity: 0; transform: translate(6px, 26px); }
  }

  .icon-wrap{
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 16px;
  }
  .title-row{
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .card h3{
    font-size: 19px;
    font-weight: 700;
  }
  .badge{
    font-size: 11px;
    font-weight: 800;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--purple);
    background: var(--purple-soft);
    padding: 3px 9px;
    border-radius: 999px;
  }
  .card p{
    margin: 8px 0 0;
    font-size: 14.5px;
    color: var(--ink-soft);
  }
  .go{
    display: inline-block;
    margin-top: 16px;
    font-size: 13.5px;
    font-weight: 700;
    color: var(--accent);
  }
  .card.soon .go{ color: var(--ink-soft); }

  /* ---------- footer ---------- */
  footer{
    max-width: 640px;
    margin: 0 auto;
    padding: 10px 24px 50px;
    text-align: center;
    font-size: 13px;
    color: var(--ink-soft);
  }
  footer p{ margin: 4px 0; }

  @media (prefers-reduced-motion: reduce){
    .card{ animation: none; opacity: 1; transform: none; }
    .bite, .crumb{ transition: none; animation: none !important; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <div class="logo"></div>
    <div class="logo-text">Fun<span>Bite</span></div>
  </div>

  <section class="hero">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="eyebrow">Playground</div>
    <h1>Bite-sized fun for your thumbs.</h1>
    <p>Tiny interactive toys and games you can finish before your coffee gets cold.</p>
  </section>

  <div class="section-label">Pick something to poke at</div>
  <div class="grid" id="grid"></div>

  <footer>
    <p>Made with 🍪 — new bites added regularly.</p>
    <p id="year"></p>
  </footer>

<script>
  // Add new games here — one line each, the rest builds itself.
  const games = [
    { icon: '💰', title: 'Spend Billionaire Money', desc: 'Spend billions on mansions, cars, and rockets!', link: './spend-money/index.html', soon: false },
    { icon: '⚡', title: 'More Games Coming Soon', desc: 'New interactive mini-games dropping soon.', link: '#', soon: true }
  ];

  const accents = [
    ['var(--pink)', 'var(--pink-soft)'],
    ['var(--purple)', 'var(--purple-soft)'],
    ['var(--mint)', 'var(--mint-soft)'],
    ['var(--yellow)', 'var(--yellow-soft)']
  ];

  const grid = document.getElementById('grid');

  games.forEach((game, i) => {
    const [accent, accentSoft] = accents[i % accents.length];
    const el = document.createElement(game.soon ? 'div' : 'a');

    el.className = 'card' + (game.soon ? ' soon' : '');
    el.style.setProperty('--accent', accent);
    el.style.setProperty('--accent-soft', accentSoft);
    el.style.setProperty('--i', i);

    if (!game.soon) {
      el.href = game.link;
    } else {
      el.setAttribute('role', 'button');
      el.setAttribute('tabindex', '0');
      el.setAttribute('aria-disabled', 'true');
    }

    el.innerHTML = `
      <span class="bite" aria-hidden="true">
        <span class="crumb"></span><span class="crumb"></span><span class="crumb"></span>
      </span>
      <div class="icon-wrap">${game.icon}</div>
      <div class="title-row">
        <h3>${game.title}</h3>
        ${game.soon ? '<span class="badge">Soon</span>' : ''}
      </div>
      <p>${game.desc}</p>
      <span class="go">${game.soon ? 'Stay tuned' : 'Tap to play →'}</span>
    `;

    // little "bite" animation on tap or hover
    const bite = () => {
      el.classList.add('biting');
      setTimeout(() => el.classList.remove('biting'), 650);
    };
    el.addEventListener('pointerenter', bite);
    el.addEventListener('pointerdown', bite);

    if (game.soon) {
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); bite(); }
      });
    }

    grid.appendChild(el);
  });

  document.getElementById('year').textContent = '© ' + new Date().getFullYear() + ' FunBite';
</script>

</body>
</html>
